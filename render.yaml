services:
  - type: worker
    name: yarin-job-alerter
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    envVars:
      - key: WHATSAPP_PHONE
        sync: false
      - key: CALLMEBOT_APIKEY
        sync: false
      - key: CHECK_INTERVAL_H
        value: "6"
